<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Portal Docente</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #27ae60; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        h2 { color: var(--primary); margin: 0; font-size: 1.5rem; }
        
        .info-prof { background: #e8f0fe; padding: 15px; border-radius: 12px; margin-bottom: 25px; color: #1967d2; font-weight: 600; border-left: 6px solid var(--primary); display: flex; align-items: center; gap: 10px; }
        
        /* Layout em Grade para Gráfico e Tabela */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 20px; }
        .chart-container { height: 300px; width: 100%; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #666; font-size: 0.85rem; text-transform: uppercase; }
        .total-row { background: #f8f9fa; font-weight: bold; font-size: 1.1rem; }
        .badge-total { background: var(--success); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.9rem; }

        .btn-v { padding: 10px 20px; background: #666; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-v:hover { background: #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📊 Meu Desempenho</h2>
        <button class="btn-v" onclick="window.location.href='index.html'">← Voltar</button>
    </div>
    
    <div id="boxProf" class="info-prof">Carregando professor...</div>

    <div class="dashboard-grid">
        <div class="card">
            <h3 style="margin-top:0; font-size: 1.1rem; color: #555;">Resumo por Disciplina</h3>
            <table>
                <thead>
                    <tr><th>Área</th><th style="text-align:center">Aulas</th></tr>
                </thead>
                <tbody id="corpo"></tbody>
                <tfoot>
                    <tr class="total-row">
                        <td>TOTAL ACUMULADO</td>
                        <td style="text-align:center"><span id="somaTotal" class="badge-total">0</span></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="card">
            <h3 style="margin-top:0; font-size: 1.1rem; color: #555;">Distribuição Visual</h3>
            <div id="graficoPizza" class="chart-container"></div>
        </div>
    </div>
</div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbyTFf8mbcbQjmLveCdsKe1uG3Z8PCtZCgJHc3Md--y60METkRy0yhlqwKbbuq5fQk2N7A/exec'; 
    const profAtivo = localStorage.getItem('professor');

    // Inicializa o Google Charts
    google.charts.load('current', {'packages':['corechart']});

    window.onload = () => {
        if (!profAtivo) { window.location.href = 'index.html'; return; }
        document.getElementById('boxProf').innerHTML = "<span>👤</span> Professor(a): " + profAtivo;
        
        fetch(url + '?tipo=consolidado')
        .then(r => r.json())
        .then(dados => {
            const meusDados = dados.filter(d => d.professor.trim() === profAtivo.trim());
            processarDados(meusDados);
        });
    };

    function processarDados(dados) {
        let resumo = {};
        let total = 0;

        dados.forEach(d => {
            resumo[d.area] = (resumo[d.area] || 0) + (parseInt(d.aulas) || 0);
            total += (parseInt(d.aulas) || 0);
        });

        // Atualizar Tabela
        let html = "";
        let dadosGrafico = [['Disciplina', 'Aulas']];
        
        Object.keys(resumo).sort().forEach(disc => {
            html += `<tr><td>${disc}</td><td style="text-align:center; font-weight:bold;">${resumo[disc]}</td></tr>`;
            dadosGrafico.push([disc, resumo[disc]]);
        });

        document.getElementById('corpo').innerHTML = html || "<tr><td colspan='2'>Sem registros.</td></tr>";
        document.getElementById('somaTotal').innerText = total;

        // Desenhar Gráfico se houver dados
        if(total > 0) {
            google.charts.setOnLoadCallback(() => desenharGrafico(dadosGrafico));
        }
    }

    function desenharGrafico(dadosBrutos) {
        const data = google.visualization.arrayToDataTable(dadosBrutos);
        const options = {
            pieHole: 0.4,
            chartArea: {width: '100%', height: '80%'},
            legend: {position: 'bottom'},
            colors: ['#1a73e8', '#27ae60', '#f39c12', '#e74c3c', '#9b59b6', '#1abc9c']
        };
        const chart = new google.visualization.PieChart(document.getElementById('graficoPizza'));
        chart.draw(data, options);
    }
</script>
</body>
</html>
