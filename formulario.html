<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aula</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-salvar { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2 id="titulo">📝 Registro de Aula</h2>
    <form id="formAula">
        <input type="hidden" name="rowId" id="rowId">
        <div class="card">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Bimestre</label><select name="bimestre" id="bimestre"><option>1º Bimestre</option><option>2º Bimestre</option><option>3º Bimestre</option><option>4º Bimestre</option></select></div>
                <div style="flex:1;"><label>Data</label><input type="date" name="data" id="campoData" required></div>
            </div>
            <label>Aulas</label><select name="totalAulas" id="totalAulas"><option value="1">1 Aula</option><option value="2">2 Aulas</option><option value="3">3 Aulas</option><option value="4">4 Aulas</option></select>
        </div>
        <div class="card">
            <label>Área</label><select id="area" name="area" required></select>
            <label>Ano</label><select id="ano" name="ano" disabled required></select>
            <label>Práticas</label><select id="praticas" name="praticas" disabled required></select>
            <label>Objetos</label><select id="objetos" name="objetos" disabled required></select>
            <label>Habilidades</label><select id="habilidades" name="habilidades" disabled required></select>
        </div>
        <div class="card">
            <label>Tema</label><input type="text" id="tema" name="tema" required>
            <label>Metodologia</label><textarea id="metodologia" name="metodologia" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-salvar" id="btnSalvar">SALVAR REGISTRO</button>
    </form>
</div>
<script>
    const url = 'https://script.google.com/macros/s/AKfycbyTFf8mbcbQjmLveCdsKe1uG3Z8PCtZCgJHc3Md--y60METkRy0yhlqwKbbuq5fQk2N7A/exec'; let baseDados = [];

    window.onload = () => {
        fetch(url).then(res => res.json()).then(data => {
            baseDados = data; preencher('area', [...new Set(data.map(r => r[0]))].sort());
            const p = new URLSearchParams(window.location.search);
            if(p.get('modo') === 'editar') carregarEdicao();
        });
    };

    function preencher(id, lista) {
        const s = document.getElementById(id); s.innerHTML = '<option value="">Selecione...</option>';
        lista.forEach(i => s.innerHTML += `<option value="${i}">${i}</option>`); s.disabled = false;
    }

    document.getElementById('area').onchange = (e) => preencher('ano', [...new Set(baseDados.filter(r => r[0] === e.target.value).map(r => r[1]))]);
    document.getElementById('ano').onchange = (e) => preencher('praticas', [...new Set(baseDados.filter(r => r[0] === document.getElementById('area').value && r[1] === e.target.value).map(r => r[2]))]);
    document.getElementById('praticas').onchange = (e) => preencher('objetos', [...new Set(baseDados.filter(r => r[0] === document.getElementById('area').value && r[1] === document.getElementById('ano').value && r[2] === e.target.value).map(r => r[3]))]);
    document.getElementById('objetos').onchange = (e) => preencher('habilidades', [...new Set(baseDados.filter(r => r[0] === document.getElementById('area').value && r[1] === document.getElementById('ano').value && r[2] === document.getElementById('praticas').value && r[3] === e.target.value).map(r => r[4]))]);

    function carregarEdicao() {
        const d = JSON.parse(localStorage.getItem('edit_dados'));
        document.getElementById('titulo').innerText = "✏️ Editar Registro";
        document.getElementById('rowId').value = localStorage.getItem('edit_id');
        document.getElementById('bimestre').value = d[4];
        document.getElementById('campoData').value = new Date(d[5]).toISOString().split('T')[0];
        document.getElementById('totalAulas').value = d[6];
        document.getElementById('tema').value = d[12];
        document.getElementById('metodologia').value = d[13];

        const steps = ['area', 'ano', 'praticas', 'objetos', 'habilidades'];
        const vals = [d[7], d[8], d[9], d[10], d[11]];
        
        const disparar = (i) => {
            if(i >= steps.length) return;
            const el = document.getElementById(steps[i]);
            el.value = vals[i];
            el.dispatchEvent(new Event('change'));
            setTimeout(() => disparar(i+1), 150);
        };
        disparar(0);
    }

    document.getElementById('formAula').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar'); btn.innerText = "Salvando..."; btn.disabled = true;
        const fd = new FormData(e.target);
        ['escola', 'professor', 'turno', 'turma'].forEach(k => fd.append(k, localStorage.getItem(k)));
        fetch(url, {method:'POST', body:fd}).then(() => { alert("Sucesso!"); window.location.href='index.html'; });
    };
</script>
</body>
</html>
