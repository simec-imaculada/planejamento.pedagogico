<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Docente - Login</title>
    <style>
        :root { --primary: #1a73e8; --success: #27ae60; --text: #3c4043; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        .logo-container img { max-width: 120px; margin-bottom: 5px; }
        .copyright { font-size: 10px; color: #777; margin-bottom: 20px; display: block; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 12px; text-align: left; color: #5f6368; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #dadce0; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; bottom: 30px; z-index: 99; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>
<div id="toast"></div>
<div class="card">
    <div class="logo-container">
        <img src="niumvideo.jpeg" alt="Logo">
        <span class="copyright">Direitos Autorais Erivaldo Silva</span>
    </div>
    <label>Professor</label>
    <select id="professor"><option>Carregando...</option></select>
    <label>Senha</label>
    <input type="password" id="senha" placeholder="Sua senha">
    <button class="btn" style="background:#f39c12" onclick="validar('busca')">MEUS PLANOS / CORRIGIR</button>
    <button class="btn" style="background:#1a73e8" onclick="validar('dash')">📊 ESTATÍSTICAS</button>
    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
    <label>Escola / Turma</label>
    <select id="escola"><option value="">Escola...</option></select>
    <select id="turno" style="margin-top:8px;"><option value="">Turno...</option></select>
    <select id="turma" style="margin-top:8px;"><option value="">Turma...</option></select>
    <button class="btn" style="background:#27ae60" onclick="validar('novo')">NOVO PLANO</button>
</div>
<script>
    const url = 'https://script.google.com/macros/s/AKfycbyTFf8mbcbQjmLveCdsKe1uG3Z8PCtZCgJHc3Md--y60METkRy0yhlqwKbbuq5fQk2N7A/exec'; 
    function showToast(m, c="#333") { const x = document.getElementById("toast"); x.innerText = m; x.style.background = c; x.className = "show"; setTimeout(() => x.className = "", 3000); }
    window.onload = () => {
        fetch(url + '?tipo=docentes').then(res => res.json()).then(data => {
            data.shift();
            const montar = (id, col) => {
                const itens = [...new Set(data.map(r => r[col]).filter(v => v !== ""))].sort();
                const el = document.getElementById(id);
                el.innerHTML = `<option value="">${id.toUpperCase()}...</option>`;
                itens.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
            };
            montar('professor', 1); montar('escola', 0); montar('turno', 2); montar('turma', 3);
        });
    };
    function validar(modo) {
        const prof = document.getElementById('professor').value;
        const pass = document.getElementById('senha').value;
        if(!prof || !pass) return showToast("Preencha tudo!", "#e74c3c");
        fetch(`${url}?tipo=login&user=${encodeURIComponent(prof)}&pass=${encodeURIComponent(pass)}`)
        .then(r => r.json()).then(res => {
            if(res.sucesso) {
                localStorage.clear();
                localStorage.setItem('professor', prof);
                if(modo === 'novo') {
                    localStorage.setItem('escola', document.getElementById('escola').value);
                    localStorage.setItem('turno', document.getElementById('turno').value);
                    localStorage.setItem('turma', document.getElementById('turma').value);
                }
                window.location.href = modo === 'dash' ? 'dashboard.html' : (modo === 'novo' ? 'formulario.html' : 'busca.html');
            } else showToast("Senha incorreta!", "#e74c3c");
        });
    }
</script>
</body>
</html>
