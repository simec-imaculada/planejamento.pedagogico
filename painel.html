<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desempenho por Turma - Portal Docente</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 950px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { background: #e8f0fe; padding: 12px; border-radius: 8px; border-left: 5px solid var(--primary); margin-bottom: 20px; font-weight: bold; color: var(--primary); }
        
        /* Tabela Estilizada */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #ddd; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        
        .row-agrupada { background: #fdfdfd; font-weight: bold; color: #1a73e8; }
        .col-total { font-weight: bold; color: #27ae60; text-align: center; background: #f0fff4; }
        .col-central { text-align: center; }

        .footer-total { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; background: #333; color: white; padding: 15px 25px; border-radius: 10px; }
        .badge-total { background: #27ae60; color: white; padding: 8px 20px; border-radius: 8px; font-weight: bold; font-size: 20px; }
        .btn-voltar { background: #666; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        
        @media (max-width: 600px) { th, td { padding: 8px; font-size: 11px; } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">📊 Painel de Carga Horária</h2>
        <a href="index.html" class="btn-voltar">← Voltar</a>
    </div>

    <div class="user-info" id="nomeProfessor">👤 Professor(a): Carregando...</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Área / Disciplina</th>
                    <th>Ano / Série</th>
                    <th>Bimestre</th>
                    <th class="col-central">Aulas</th>
                    <th class="col-central">Total Acumulado (Turma)</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <tr><td colspan="5" style="text-align:center;">Buscando dados na planilha...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer-total">
        <div>
            <span style="display:block; font-size:12px; opacity:0.8;">SOMA TOTAL DE TODAS AS TURMAS</span>
            <span style="font-weight: bold; font-size: 16px;">TOTAL ANUAL ACUMULADO</span>
        </div>
        <div id="totalGeral" class="badge-total">0</div>
    </div>
</div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbw7wTGHKZ3j8HNDW2bhodphWVBKb5n3jIu7O_8hWfB9oChBmzEq8X3PoPcxyUQW_Hgu3w/exec'; // 
    const profLogado = localStorage.getItem('professor');

    window.onload = () => {
        if (!profLogado) { window.location.href = 'index.html'; return; }
        document.getElementById('nomeProfessor').innerText = "👤 Professor(a): " + profLogado;
        carregarDados();
    };

    function carregarDados() {
        fetch(url + '?tipo=busca&prof=' + encodeURIComponent(profLogado))
        .then(res => res.json())
        .then(dados => {
            processarDados(dados);
        })
        .catch(err => {
            document.getElementById('tabelaCorpo').innerHTML = "<tr><td colspan='5'>Erro ao carregar dados.</td></tr>";
        });
    }

    function processarDados(registros) {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = "";
        
        // Mapa de agrupamento: Disciplina -> Ano -> Bimestres
        let mapa = {};
        let acumuladoGeral = 0;

        registros.forEach(item => {
            const d = item.dados;
            const area = d[7];     // Col H: Área
            const ano = d[8];      // Col I: Ano/Série
            const bimestre = d[4]; // Col E: Bimestre
            const qtd = parseInt(d[6]) || 0; // Col G: Qtd Aulas

            const chaveBase = area + "|" + ano; // Identificador único para a Turma

            if (!mapa[chaveBase]) {
                mapa[chaveBase] = { 
                    area: area, 
                    ano: ano, 
                    bimestres: {}, 
                    totalTurma: 0 
                };
            }
            
            if (!mapa[chaveBase].bimestres[bimestre]) {
                mapa[chaveBase].bimestres[bimestre] = 0;
            }

            mapa[chaveBase].bimestres[bimestre] += qtd;
            mapa[chaveBase].totalTurma += qtd;
            acumuladoGeral += qtd;
        });

        // Renderizar a tabela organizada
        const chavesOrdenadas = Object.keys(mapa).sort();

        chavesOrdenadas.forEach(chave => {
            const info = mapa[chave];
            const bimestresDaTurma = Object.keys(info.bimestres).sort();
            const totalLinhas = bimestresDaTurma.length;

            bimestresDaTurma.forEach((bi, index) => {
                let html = `<tr>`;
                
                // Agrupa Disciplina e Ano apenas na primeira linha daquele bloco
                if (index === 0) {
                    html += `<td rowspan="${totalLinhas}" class="row-agrupada">${info.area}</td>`;
                    html += `<td rowspan="${totalLinhas}" style="font-weight:bold;">${info.ano}</td>`;
                }

                html += `<td>${bi}</td>`;
                html += `<td class="col-central">${info.bimestres[bi]}</td>`;

                // Total acumulado daquela disciplina naquele ano específico
                if (index === 0) {
                    html += `<td rowspan="${totalLinhas}" class="col-total">${info.totalTurma}</td>`;
                }

                html += `</tr>`;
                corpo.innerHTML += html;
            });
        });

        document.getElementById('totalGeral').innerText = acumuladoGeral;
    }
</script>

</body>
</html>
