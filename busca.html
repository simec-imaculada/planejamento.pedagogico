<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Registros - Portal Docente</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    <style>
        :root { --primary: #1a73e8; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        .header-pagina { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .btn-voltar { background: #666; color: white; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        .filtro-container { margin-bottom: 20px; }
        #inputBusca { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        #inputBusca:focus { border-color: var(--primary); outline: none; }

        .lista-planos { display: grid; gap: 15px; }
        .card-plano { border: 1px solid #eee; padding: 15px; border-radius: 10px; background: #fff; transition: 0.2s; }
        .card-plano:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        
        .btns-acoes { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-acao { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; flex: 1; min-width: 100px; }
        .btn-print { background: var(--primary); }
        .btn-edit { background: #f39c12; }
        .btn-del { background: #e74c3c; }

        /* ESTILO DA ÁREA DE IMPRESSÃO (Oculta na tela) */
        #areaImpressao { display: none; }

        @media print {
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
            
            .ficha-pdf { border: 1px solid #000; padding: 25px; min-height: 98vh; page-break-after: always; }
            
            /* LOGO TAMANHO 2x2 cm */
            .logo-pdf { 
                height: 75px; 
                width: 75px; 
                object-fit: contain; 
                margin-bottom: 10px;
                display: block;
                margin-left: auto;
                margin-right: auto;
            }

            .cabecalho-pdf { text-align: center; border-bottom: 2px solid #000; margin-bottom: 15px; padding-bottom: 10px; }
            .linha-pdf { margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #f0f0f0; padding-bottom: 3px; }
            .label-pdf { font-weight: bold; text-transform: uppercase; font-size: 11px; color: #333; }
            .assinaturas { margin-top: 50px; display: flex; justify-content: space-around; }
            .campo-assinatura { border-top: 1px solid #000; width: 250px; text-align: center; font-size: 10px; padding-top: 5px; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="header-pagina">
        <a href="index.html" class="btn-voltar">← Voltar</a>
        <h2 style="margin:0; color: var(--primary);">📂 Meus Planos</h2>
    </div>

    <div class="filtro-container">
        <input type="text" id="inputBusca" placeholder="🔍 Pesquisar por tema, escola ou habilidade..." onkeyup="filtrarPlanos()">
    </div>

    <div id="listaPlanos" class="lista-planos">
        <p style="text-align:center; color:#666;">Carregando seus registros...</p>
    </div>
</div>

<div id="areaImpressao"></div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbw7wTGHKZ3j8HNDW2bhodphWVBKb5n3jIu7O_8hWfB9oChBmzEq8X3PoPcxyUQW_Hgu3w/exec'; // t
    const profLogado = localStorage.getItem('professor');
    let dadosOriginais = [];

    // TABELA DE LOGOS
    const tabelaLogos = {
        "EMEIF MARIA MADALENA TORRES DANTAS": "https://lh3.googleusercontent.com/d/1rjTUGgFFN7v3WNYH3BxEviNhzhaZ-_EA",
        "EMEF JOAQUIM ALVES FEITOSA": "https://lh3.googleusercontent.com/d/1foLraCaxPh8yiVUY2lvoPCF36-hnDnBR",
        "EMEF MIGUEL OTAVIANO DE MEDEIROS": "https://lh3.googleusercontent.com/d/1tsHbZTs2Kq8TFWnKShzcQqXqzg26vs-j",
        "EMEIF FRANCISCA QUIRINO FERREIRA": "https://lh3.googleusercontent.com/d/1aSPr3krLidZZGB6KlQ7sEbeiIXUgOQIQ",
        "EMEIF JOÃO GONÇALVES DA SILVA": "https://lh3.googleusercontent.com/d/1saytGYwX_nWg0n3a4oLY8_S9qieW0p0S",
        "EMEIF JOSÉ ALVES SABINO": "https://lh3.googleusercontent.com/d/1PKupIZhWDcxvfWlaXVwaBS6i-mItQsa6",
        "EMEIF JOSÉ PEDRO DE MELO": "https://lh3.googleusercontent.com/d/1VPINfIhkuZ7CNzMiyWkqVD5RxnozuMh0",
        "EMEIF JOSÉ VIEIRA DA SILVA": "https://lh3.googleusercontent.com/d/1CamXcPhkf3nXqvjfyT_EgN_m4_CiEogA",
        "EMEIF MARIA PEREIRA DOS SANTOS": "https://lh3.googleusercontent.com/d/1npaLJ5eWskOzLmtGkV7oNYP2Woa_sAT9",
        "PADRAO": "niumvideo.jpeg"
    };

    window.onload = () => {
        if (!profLogado) { window.location.href = 'index.html'; return; }
        buscarDados();
    };

    function buscarDados() {
        fetch(url + '?tipo=busca&prof=' + encodeURIComponent(profLogado))
        .then(r => r.json())
        .then(dados => {
            dadosOriginais = dados;
            renderizarLista(dados);
        });
    }

    function renderizarLista(lista) {
        const container = document.getElementById('listaPlanos');
        container.innerHTML = lista.length === 0 ? '<p style="text-align:center;">Nenhum plano encontrado.</p>' : '';

        lista.forEach(item => {
            const d = item.dados;
            const dataF = new Date(d[5]).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
            const dadosStr = encodeURIComponent(JSON.stringify(d));

            container.innerHTML += `
                <div class="card-plano">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span style="font-size:12px; color:var(--primary); font-weight:bold;">${d[4]}</span>
                        <span style="font-size:12px; color:#666;">${dataF}</span>
                    </div>
                    <div style="font-weight:bold; margin-bottom:5px;">${d[12]}</div>
                    <div style="font-size:13px; color:#444;">${d[0]} - ${d[3]}</div>
                    
                    <div class="btns-acoes">
                        <button class="btn-acao btn-print" onclick="gerarPDF('${dadosStr}')">🖨️ PDF</button>
                        <button class="btn-acao btn-edit" onclick="prepararEdicao(${item.id}, '${dadosStr}')">✏️ EDITAR</button>
                        <button class="btn-acao btn-del" onclick="deletar(${item.id})">🗑️ EXCLUIR</button>
                    </div>
                </div>
            `;
        });
    }

    function filtrarPlanos() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtrados = dadosOriginais.filter(item => {
            const d = item.dados;
            return d[0].toLowerCase().includes(termo) || 
                   d[12].toLowerCase().includes(termo) || 
                   d[11].toLowerCase().includes(termo);
        });
        renderizarLista(filtrados);
    }

    function gerarPDF(dadosCod) {
        const d = JSON.parse(decodeURIComponent(dadosCod));
        const dataF = new Date(d[5]).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
        const escola = d[0].trim();
        const logoURL = tabelaLogos[escola] || tabelaLogos["PADRAO"];

        const areaImpressao = document.getElementById('areaImpressao');
        areaImpressao.innerHTML = `
            <div class="ficha-pdf">
                <div class="cabecalho-pdf">
                    <img src="${logoURL}" class="logo-pdf" onerror="this.src='niumvideo.jpeg'">
                    <h2 style="margin:5px 0; text-transform: uppercase; font-size: 18px;">${escola}</h2>
                    <p style="margin:0; font-weight:bold; color:#555;">PLANO DE AULA SEMANAL</p>
                </div>

                <div class="linha-pdf"><span class="label-pdf">Professor(a):</span> ${d[1]}</div>
                
                <div style="display:flex; gap:20px;">
                    <div class="linha-pdf" style="flex:1;"><span class="label-pdf">Data:</span> ${dataF}</div>
                    <div class="linha-pdf" style="flex:1;"><span class="label-pdf">Turma:</span> ${d[3]}</div>
                    <div class="linha-pdf" style="flex:1;"><span class="label-pdf">Total de Aulas:</span> ${d[6]}</div>
                </div>

                <div class="linha-pdf"><span class="label-pdf">Área de Conhecimento:</span> ${d[7]}</div>
                <div class="linha-pdf"><span class="label-pdf">Ano/Série:</span> ${d[8]}</div>
                <div class="linha-pdf"><span class="label-pdf">Práticas de Linguagem:</span> ${d[9]}</div>
                <div class="linha-pdf"><span class="label-pdf">Objetos de Conhecimento:</span> ${d[10]}</div>
                <div class="linha-pdf"><span class="label-pdf">Tema/Subtema:</span> ${d[12]}</div>
                <div class="linha-pdf"><span class="label-pdf">Habilidades:</span><br>${d[11]}</div>
                
                <div class="linha-pdf" style="border:none; margin-top:10px;">
                    <span class="label-pdf">Metodologia e Procedimentos:</span><br>
                    <div style="font-size:12px; margin-top:5px; text-align:justify;">${d[13].replace(/\n/g, '<br>')}</div>
                </div>

                <div class="assinaturas">
                    <div class="campo-assinatura">Assinatura do Professor(a)</div>
                    <div class="campo-assinatura">Coordenação / Direção</div>
                </div>
            </div>
        `;

        setTimeout(() => { window.print(); }, 500);
    }

    function prepararEdicao(id, dadosCod) {
        localStorage.setItem('edit_id', id);
        localStorage.setItem('edit_dados', decodeURIComponent(dadosCod));
        window.location.href = 'formulario.html?modo=editar';
    }

    function deletar(id) {
        if(!confirm("Deseja realmente excluir este registro?")) return;
        fetch(url + '?acao=deletar&rowId=' + id, {method: 'POST'})
        .then(() => {
            alert("Excluído com sucesso!");
            buscarDados();
        });
    }
</script>

</body>
</html>
